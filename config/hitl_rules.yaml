# HITL Trigger Rules — Claims Processing
# When any rule matches, the agent pauses and creates a HITL task.

trigger_rules:
  - rule_id: "high_amount"
    description: "Claim amount exceeds $6,000 (≈ Rs 5,00,000)"
    field: "claim_amount"
    operator: ">"
    value: 6000
    reason: "High-value claim requires manual review"

  - rule_id: "claim_rejection"
    description: "Claim is being rejected"
    field: "decision"
    operator: "equals"
    value: "reject"
    reason: "Claim rejection requires human confirmation"

  - rule_id: "partial_settlement"
    description: "Claim is being partially settled"
    field: "decision"
    operator: "equals"
    value: "partial"
    reason: "Partial settlement requires human approval"

  - rule_id: "fraud_flag"
    description: "Fraud flag raised during claim processing"
    field: "fraud_flag"
    operator: "is_true"
    value: true
    reason: "Fraud detection requires manual review"

  - rule_id: "policy_exclusion"
    description: "Policy exclusion applied to claim"
    field: "policy_exclusion"
    operator: "is_true"
    value: true
    reason: "Policy exclusion requires human verification"